<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusion Metadata Query Helper</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #38bdf8;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #334155;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 300px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: var(--surface);
        }
        #sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-weight: bold;
            color: var(--primary);
            font-size: 1.2rem;
        }
        #module-list {
            overflow-y: auto;
            flex: 1;
        }
        .module-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #2d3748;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .module-item:hover {
            background: #334155;
        }
        .module-item.active {
            background: var(--primary);
            color: var(--bg);
            font-weight: bold;
        }
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #search-bar {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #0f172a;
            color: white;
            outline: none;
        }
        input:focus {
            border-color: var(--primary);
        }
        #content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .table-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }
        .table-name {
            font-weight: bold;
            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        .table-desc {
            color: var(--text-dim);
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .detail-view {
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: #1e293b;
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }
        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            background: #334155;
            color: var(--text-dim);
            margin-left: 10px;
        }
        .json-block {
            background: #0f172a;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            color: #10b981;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="sidebar-header">Fusion Metadata</div>
        <div id="module-list">Loading modules...</div>
    </div>
    <div id="main">
        <div id="search-bar">
            <input type="text" id="search-input" placeholder="Search tables, columns, or business terms (semantic)...">
        </div>
        <div id="content">
            <div style="text-align: center; color: var(--text-dim); margin-top: 100px;">
                <h2>Welcome to Query Helper</h2>
                <p>Select a module from the left or use the search bar to find table definitions.</p>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3005/api';
        const moduleList = document.getElementById('module-list');
        const content = document.getElementById('content');
        const searchInput = document.getElementById('search-input');

        // Load Modules
        async function loadModules() {
            const res = await fetch(`${API}/modules`);
            const modules = await res.json();
            moduleList.innerHTML = modules.map(m => `
                <div class="module-item" onclick="loadTables(${m.MODULE_ID}, this)">
                    ${m.NAME.replace(/^\d+_/, '').replace(/_/g, ' ')}
                </div>
            `).join('');
        }

        // Load Tables
        async function loadTables(moduleId, el) {
            document.querySelectorAll('.module-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            content.innerHTML = '<div style="text-align:center">Loading tables...</div>';
            try {
                const res = await fetch(`${API}/tables?module_id=${moduleId}`);
                if (!res.ok) throw new Error(await res.text());
                const tables = await res.json();
                
                content.innerHTML = `
                    <h2>Tables in ${el.innerText}</h2>
                    ${tables.length === 0 ? '<p>No tables found in this module.</p>' : tables.map(t => `
                        <div class="table-card" onclick="loadTableDetails('${t.TABLE_NAME}')">
                            <div class="table-name">${t.TABLE_NAME} <span class="badge">${t.OBJECT_TYPE}</span></div>
                            <div class="table-desc">${t.DESCRIPTION || 'No description available.'}</div>
                        </div>
                    `).join('')}
                `;
            } catch (err) {
                content.innerHTML = `<div style="color:red; text-align:center">Error loading tables: ${err.message}</div>`;
            }
        }

        // Load Table Details
        async function loadTableDetails(name) {
            content.innerHTML = '<div style="text-align:center">Loading details...</div>';
            const res = await fetch(`${API}/table/${name}`);
            const data = await res.json();
            
            // Parse metadata if it's a string
            let metaObj = data.METADATA;
            if (typeof metaObj === 'string') {
                try { metaObj = JSON.parse(metaObj); } catch(e) { metaObj = { error: "Could not parse metadata" }; }
            }
            
            content.innerHTML = `
                <div class="detail-view">
                    <button onclick="window.history.back()" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-bottom:10px;"><- Back</button>
                    <h1>${data.TABLE_NAME} <span class="badge">${data.OBJECT_TYPE}</span></h1>
                    <p style="color:var(--text-dim)">${data.DESCRIPTION || 'No description.'}</p>
                    
                    ${data.VIEW_QUERY ? `<h3>View SQL Definition</h3><pre style="background:#0f172a; padding:10px; font-size:0.8rem; overflow-x:auto">${data.VIEW_QUERY}</pre>` : ''}

                    <h3>Columns</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Null?</th>
                                <th>Comments</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.COLUMNS.map(c => `
                                <tr>
                                    <td style="color:var(--primary); font-weight:bold">${c.COLUMN_NAME}</td>
                                    <td>${c.DATATYPE || 'N/A'}</td>
                                    <td>${c.IS_NULLABLE || 'N/A'}</td>
                                    <td style="font-size:0.8rem">${c.COMMENTS || ''}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>

                    <h3>Raw Metadata (JSON)</h3>
                    <div class="json-block">${JSON.stringify(metaObj, null, 2)}</div>
                </div>
            `;
        }

        // Search logic
        searchInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const q = searchInput.value;
                if (!q) return;
                
                content.innerHTML = '<div style="text-align:center">Searching Metadata & Semantic Vectors...</div>';
                try {
                    const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
                    const data = await res.json();
                    
                    let html = `<h2>Search Results for "${q}"</h2>`;
                    
                    // 1. Semantic Metadata Tables (New!)
                    if (data.semanticMetadata && data.semanticMetadata.length > 0) {
                        html += `<h3 style="color:var(--primary)">Recommended Tables (AI Semantic Match)</h3>`;
                        html += data.semanticMetadata.map(t => `
                            <div class="table-card" style="border-left: 4px solid var(--primary)" onclick="loadTableDetails('${t.TABLE_NAME}')">
                                <div class="table-name">${t.TABLE_NAME} <span style="font-size:0.7rem; color:var(--text-dim)">Match Score: ${(1 - t.DISTANCE).toFixed(4)}</span></div>
                                <div class="table-desc">${t.DESCRIPTION || ''}</div>
                            </div>
                        `).join('');
                    }

                    // 2. Keyword Matches
                    if (data.keyword && data.keyword.length > 0) {
                        html += `<h3>Keyword Matches</h3>`;
                        html += data.keyword.map(t => `
                            <div class="table-card" onclick="loadTableDetails('${t.TABLE_NAME}')">
                                <div class="table-name">${t.TABLE_NAME}</div>
                                <div class="table-desc">${t.DESCRIPTION || ''}</div>
                            </div>
                        `).join('');
                    }

                    if (!data.keyword?.length && !data.semanticMetadata?.length) {
                        html += '<p>No results found in metadata database.</p>';
                    }
                    
                    content.innerHTML = html;
                } catch (err) {
                    content.innerHTML = `<div style="color:red">Search failed: ${err.message}</div>`;
                }
            }
        });

        loadModules();
    </script>
</body>
</html>
